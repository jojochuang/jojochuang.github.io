<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>中文備課工具</title>
  <meta name="description" content="聽音辨字、聽寫語詞考試等中文備課工具。" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='24' font-size='24'>字</text></svg>">
  <style>
    :root{
      --bg1:#0f172a; --bg2:#1f2937;
      --card:#ffffff; --muted:#6b7280;
      --brand:#2563eb; --brand2:#4f46e5;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei","微軟正黑體",Arial,sans-serif;
      color:#0b1220;
      background: radial-gradient(1200px 700px at 20% 10%, rgba(79,70,229,.32), transparent 60%),
                  radial-gradient(900px 600px at 85% 25%, rgba(37,99,235,.28), transparent 55%),
                  linear-gradient(135deg,var(--bg1),var(--bg2));
      min-height:100vh;
      padding:28px 16px 40px;
    }
    .wrap{max-width:1100px;margin:0 auto}
    header{
      color:#fff;
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }
    h1{margin:0;font-size:clamp(1.6rem,4.8vw,2.4rem);letter-spacing:.5px}
    .subtitle{margin:6px 0 0;color:rgba(255,255,255,.82);max-width:52ch;line-height:1.5}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px;margin-top:18px}
    .card{
      grid-column:span 12;
      background:rgba(255,255,255,.96);
      border:1px solid rgba(255,255,255,.22);
      border-radius:16px;
      box-shadow:0 18px 60px rgba(0,0,0,.22);
      padding:18px 16px;
      backdrop-filter: blur(8px);
    }
    @media (min-width:880px){
      .card{grid-column:span 6;padding:20px 18px}
    }
    .card h2{margin:0 0 6px;font-size:1.25rem}
    .card p{margin:0 0 12px;color:#334155;line-height:1.55}
    .btnRow{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    a.btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      text-decoration:none;
      font-weight:700;
      border:1px solid rgba(37,99,235,.25);
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      color:#fff;
      box-shadow:0 8px 24px rgba(37,99,235,.35);
    }
    a.btn.secondary{
      background:#fff;
      color:#1f2937;
      border:1px solid rgba(31,41,55,.16);
      box-shadow:none;
      font-weight:650;
    }
    .note{
      margin-top:14px;
      color:rgba(255,255,255,.78);
      font-size:.95rem;
      line-height:1.55;
    }
    code{background:rgba(255,255,255,.12);color:#fff;padding:2px 6px;border-radius:8px}
    .footer{margin-top:22px;color:rgba(255,255,255,.72);font-size:.9rem}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>中文備課工具</h1>
        <div class="subtitle">給老師與學生使用的線上工具：聽音辨字、聽寫語詞考試（之後會加入字帖生成）。</div>
      </div>
    </header>

    <div class="grid">
      <section class="card">
        <h2>聽音辨字遊戲</h2>
        <p>用試算表內容出題，支援「圖片＋注音 / 全注音 / 全中文」。</p>
        <div class="btnRow">
          <a class="btn" href="/tools/listening_game/index.html">開始使用</a>
          <a class="btn secondary" href="/tools/listening_game/index.html?sheet_id=1264gdkuMnIn2k5L5KM69yumBfJFdYVhxzzsC-2R5Q2U&gid=922303464&lesson=13&mode=easy">示範連結</a>
        </div>
      </section>

      <section class="card">
        <h2>聽寫語詞考試</h2>
        <p>用試算表或 CSV 產生考試單，可全螢幕、預覽、下載 PDF。</p>
        <div class="btnRow">
          <a class="btn" href="/tools/dictation_exam/index.html">開始使用</a>
        </div>
      </section>
    </div>

    <div class="note">
      你可以把自己的試算表帶入工具網址參數（例如 <code>?sheet_id=...&amp;gid=...</code>）後分享給其他老師使用。
    </div>
    <div class="footer">© 中文備課工具（個人教學用途）</div>
  </div>
</body>
</html>
