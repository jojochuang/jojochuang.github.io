<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聽寫語詞考試</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='24' font-size='24'>字</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', '微軟正黑體', sans-serif;
            background: #f5f5f5;
            padding: calc(16px + 1cm) 16px 16px 16px;
            min-height: 100vh;
        }
        body.fullscreen-fallback {
            padding: 8px;
            position: fixed;
            inset: 0;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }
        h1 {
            text-align: center;
            margin-bottom: 16px;
            color: #333;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
            align-items: center;
        }
        .controls select {
            padding: 8px 12px;
            font-size: 1em;
            border-radius: 8px;
            border: 2px solid #a5d6a7;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 999px;
            border: none;
            font-size: 1em;
            cursor: pointer;
            background: linear-gradient(135deg, #42a5f5, #1e88e5);
            color: white;
        }
        .btn:hover { background: linear-gradient(135deg, #1e88e5, #1565c0); }
        .message { text-align: center; margin-bottom: 12px; color: #666; }
        .message.error { color: #c62828; }
        .grid-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            max-width: 100%;
            margin: 0 auto;
        }
        .grid-row {
            display: flex;
            gap: 8px;
            margin-bottom: 4px;
        }
        .cell {
            width: 2cm;
            height: 2cm;
            min-width: 2cm;
            min-height: 2cm;
            border: 2px solid #333;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5em;
            font-weight: bold;
            cursor: pointer;
            background: #fff;
            position: relative;
            transition: background 0.15s;
        }
        .cell:hover { background: #f0f0f0; }
        .cell.tianzige {
            background: #fff;
        }
        .cell.tianzige::before,
        .cell.tianzige::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            right: 0;
            bottom: 0;
            margin: auto;
        }
        .cell.tianzige::before {
            width: 0;
            height: 100%;
            border-left: 1px dashed rgba(0,0,0,0.35);
        }
        .cell.tianzige::after {
            height: 0;
            width: 100%;
            border-top: 1px dashed rgba(0,0,0,0.35);
        }
        .cell.tianzige .char-base,
        .cell.tianzige .char-radical { visibility: hidden; }
        .cell .char-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
        .cell .char-base {
            font-family: 'TW-Kai-98', 'Microsoft JhengHei', '楷體', serif;
            font-size: inherit;
            color: #000;
        }
        .cell .char-radical {
            position: absolute;
            left: 50%; top: 50%;
            transform: translate(calc(-50% + 3.7mm), calc(-50% - 2.4mm));
            font-family: 'ToneOZRadicalZKaiTraditional', serif;
            font-size: inherit;
            color: #c62828;
            pointer-events: none;
        }
        @font-face {
            font-family: 'BpmfZihiOnly';
            src: url('BpmfSpecial/BpmfZihiOnly-R.ttf') format('truetype');
            font-display: block;
        }
        @font-face {
            font-family: 'TW-Kai-98';
            /* 兼容兩種上傳位置：
               1) 字型放在專案根目錄（與 dictation_exam.html 同層）
               2) 字型放在 Fonts_Kai (1)/ 資料夾內 */
            src: url('TW-Kai-98_1.woff2') format('woff2'),
                 url('Fonts_Kai (1)/TW-Kai-98_1.woff2') format('woff2'),
                 url('Fonts_Kai (1)/TW-Kai-98_1.ttf') format('truetype');
            font-display: block;
        }
        @font-face {
            font-family: 'ToneOZRadicalZKaiTraditional';
            src: url('ToneOZ-RadicalZ-KaiTraditional.ttf') format('truetype');
            font-display: block;
        }
        @font-face {
            font-family: 'ToneOZTsuipitaTC';
            src: url('ToneOZ-Tsuipita-TC/ToneOZ-Tsuipita-TC.ttf') format('truetype');
            font-display: block;
        }
        .cell-pair { display: flex; gap: 0; align-items: stretch; }
        .cell-pair .cell { border-right: none; border-radius: 4px 0 0 4px; }
        .cell-pair .cell-bopomofo {
            width: 0.8cm; height: 2cm; min-width: 0.8cm; min-height: 2cm;
            border: 2px solid #333; border-left: 1px solid #333; border-radius: 0 4px 4px 0;
            display: flex; align-items: center; justify-content: center;
            font-family: 'BpmfZihiOnly', 'BpmfZhuyin', 'Microsoft JhengHei', sans-serif;
            font-size: 3em; font-weight: bold; cursor: pointer;
            background: #fff; transition: background 0.15s;
        }
        .cell-bopomofo:hover { background: #f0f0f0; }
        .cell-bopomofo .bopomofo-text { transform: translateX(-1mm); }
        .cell-bopomofo.tianzige .bopomofo-text { visibility: hidden; }
        .grid-row { gap: 8px; }
        .phrase-block { position: relative; display: flex; align-items: center; gap: 8px; }
        .phrase-block .phrase-highlight {
            position: absolute; inset: -2px; border-radius: 6px;
            background: rgba(66, 165, 245, 0.32); pointer-events: none;
            display: none; z-index: 1;
        }
        .phrase-block.highlight .phrase-highlight { display: block; }
        .phrase-block + .phrase-block { margin-left: 48px; }
        @media (max-width: 768px) {
            #fullscreenBtn { display: none; }
            .grid-container { flex-direction: column; align-items: center; }
            .grid-row { display: contents; }
            .phrase-block { margin-left: 0 !important; margin-top: 16px; }
            .phrase-block[data-phrase="1"] { order: 0; margin-top: 0; }
            .phrase-block[data-phrase="2"] { order: 1; }
            .phrase-block[data-phrase="3"] { order: 2; }
            .phrase-block[data-phrase="4"] { order: 3; }
            .phrase-block[data-phrase="5"] { order: 4; }
            .phrase-block[data-phrase="6"] { order: 5; }
            .phrase-block[data-phrase="7"] { order: 6; }
            .phrase-block[data-phrase="8"] { order: 7; }
            .phrase-block[data-phrase="9"] { order: 8; }
            .phrase-block[data-phrase="10"] { order: 9; }
            .controls { flex-direction: column; align-items: flex-end; flex-wrap: nowrap; }
            .controls select, .controls .btn { margin-left: 0; }
        }
        @media (max-width: 768px) and (orientation: landscape) {
            .controls { flex-direction: row; flex-wrap: nowrap; justify-content: flex-end; }
        }
        body.narrow-screen #fullscreenBtn { display: none !important; }
        body.narrow-screen .grid-container { flex-direction: column; align-items: center; }
        body.narrow-screen .grid-row { display: contents; }
        body.narrow-screen .phrase-block { margin-left: 0 !important; margin-top: 16px; }
        body.narrow-screen .phrase-block[data-phrase="1"] { order: 0; margin-top: 0; }
        body.narrow-screen .phrase-block[data-phrase="2"] { order: 1; }
        body.narrow-screen .phrase-block[data-phrase="3"] { order: 2; }
        body.narrow-screen .phrase-block[data-phrase="4"] { order: 3; }
        body.narrow-screen .phrase-block[data-phrase="5"] { order: 4; }
        body.narrow-screen .phrase-block[data-phrase="6"] { order: 5; }
        body.narrow-screen .phrase-block[data-phrase="7"] { order: 6; }
        body.narrow-screen .phrase-block[data-phrase="8"] { order: 7; }
        body.narrow-screen .phrase-block[data-phrase="9"] { order: 8; }
        body.narrow-screen .phrase-block[data-phrase="10"] { order: 9; }
        body.narrow-screen .controls { flex-direction: column; align-items: flex-end; flex-wrap: nowrap; }
        body.narrow-screen .controls select, body.narrow-screen .controls .btn { margin-left: 0; }
        body.narrow-screen.narrow-landscape .controls { flex-direction: row; justify-content: flex-end; }
        body.narrow-screen.narrow-landscape #pageContent { margin-left: 182px; max-width: calc(100vw - 200px); }
        body.narrow-screen.narrow-landscape .cell { width: min(2cm, 11vw); height: min(2cm, 11vw); min-width: min(1.2cm, 9vw); min-height: min(1.2cm, 9vw); font-size: min(3.5em, 10vw); }
        body.narrow-screen.narrow-landscape .cell-bopomofo { width: min(0.8cm, 5vw); min-width: min(0.8cm, 5vw); height: min(2cm, 11vw); min-height: min(1.2cm, 9vw); font-size: min(3em, 8vw); }
        .phrase-label {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
        }
        .phrase-num {
            font-size: 1.2em; font-weight: bold; min-width: 1.8em; text-align: center;
            font-family: inherit;
        }
        .phrase-speaker {
            width: 22px; height: 22px; padding: 0;
            border: 1px solid #999; border-radius: 50%;
            background: #fff; cursor: pointer; font-size: 11px;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .phrase-speaker:hover { background: #e3f2fd; }
        body.timer-running #modeToggleBtn { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
        body.exam-mode .char-base,
        body.exam-mode .char-radical,
        body.exam-mode .bopomofo-text { visibility: hidden !important; }
        body.mode-bopomofo .char-base,
        body.mode-bopomofo .char-radical { visibility: hidden !important; }
        /* 對答案：全部顯示，不受定稿/人工隱藏影響 */
        body.mode-answer .char-base,
        body.mode-answer .char-radical,
        body.mode-answer .bopomofo-text { visibility: visible !important; }
        /* 全注音：注音全部顯示，不受定稿/人工隱藏影響 */
        body.mode-bopomofo .bopomofo-text { visibility: visible !important; }
        /* 考試中/對答案/全注音：不顯示十字虛線 */
        body.exam-mode .cell.tianzige::before,
        body.exam-mode .cell.tianzige::after,
        body.mode-answer .cell.tianzige::before,
        body.mode-answer .cell.tianzige::after,
        body.mode-bopomofo .cell.tianzige::before,
        body.mode-bopomofo .cell.tianzige::after { display: none !important; }
        .cell-pair.empty .cell,
        .cell-pair.empty .cell-bopomofo { border-color: #e0e0e0 !important; }
        .timer-wrap {
            position: fixed; top: 16px; left: 16px;
            width: 182px; height: 182px;
            z-index: 100;
        }
        .timer-circle {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 8px solid #e0e0e0;
            background: #fff;
            position: relative;
            overflow: hidden;
        }
        .timer-fill {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(from -90deg, #42a5f5 0deg, #e0e0e0 0deg);
        }
        .timer-inner {
            position: absolute;
            inset: 13px;
            border-radius: 50%;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 27px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
        }
        .timer-inner .timer-label { font-size: 13px; opacity: 0.8; }
        .timer-wrap.running .timer-inner { cursor: default; }
        .timer-sec-label { font-size: 11px; opacity: 0.85; display: flex; align-items: center; justify-content: center; gap: 4px; margin-top: 4px; }
        .timer-sec-input { width: 42px; padding: 2px 4px; font-size: 12px; text-align: center; border: 1px solid #999; border-radius: 4px; }
        body.timer-running .timer-sec-input { opacity: 0.5; pointer-events: none; }
        body:not(.exam-mode) .phrase-num { cursor: pointer; }
        body:not(.exam-mode) .phrase-num:hover { color: #1565c0; text-decoration: underline; }
        .stroke-overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.7); display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 20px;
        }
        .stroke-overlay.hidden { display: none; }
        .stroke-overlay .stroke-row {
            display: flex; flex-wrap: wrap; gap: 20px;
            justify-content: center; align-items: center;
            margin-bottom: 16px;
            max-width: 100%;
        }
        .stroke-overlay .stroke-cell {
            width: min(22vw, 200px);
            height: min(22vw, 200px);
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #fff;
            padding: 12px;
            border-radius: 8px;
        }
        .stroke-overlay .stroke-cell img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .print-zone { display: none; }
        @media print {
            @page { size: letter landscape; margin: 5mm; }
            body > *:not(.print-zone) { display: none !important; }
            .print-zone {
                display: block !important;
                position: fixed !important;
                left: 0 !important;
                top: 0 !important;
                width: 100% !important;
                height: 100% !important;
            }
        }
        .preview-overlay {
            position: fixed; inset: 0; z-index: 1001;
            background: #333; display: flex; flex-direction: column;
            align-items: center; padding: 20px; overflow: auto;
        }
        .preview-overlay.hidden { display: none; }
        .preview-overlay .preview-toolbar {
            display: flex; gap: 12px; margin-bottom: 16px;
        }
        .preview-overlay .preview-toolbar button {
            padding: 10px 20px; border-radius: 8px; border: none;
            background: #42a5f5; color: #fff; cursor: pointer;
        }
        .preview-overlay .preview-paper {
            background: #fff; width: 279.4mm; min-height: 215.9mm;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .print-page {
            width: 279.4mm; min-height: 215.9mm; padding: 5mm;
            display: flex; box-sizing: border-box;
        }
        .print-column {
            flex: 1; padding: 0 3mm; display: flex; flex-direction: column; gap: 0;
            position: relative;
        }
        .print-column + .print-column { border-left: 1px dashed #999; }
        .column-watermark {
            position: absolute;
            top: 0;
            right: 5mm;
            font-weight: bold;
            font-size: 11pt;
            text-align: right;
            pointer-events: none;

        }

        }
        .exam-item-lower { margin-top: 8mm; }
        .exam-item .item-num {
            font-weight: bold; font-size: 11pt; width: 8mm; min-width: 8mm; flex-shrink: 0;

        .exam-item .item-units { display: flex; flex-wrap: wrap; gap: 0; align-items: stretch; }

        .exam-item .item-units > *:first-child { margin-left: 0; }

            width: 20mm; height: 20mm; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 9.8mm; font-family: 'ToneOZTsuipitaTC', 'TW-Kai-98', 'Microsoft JhengHei', serif;

    </style>
</head>
<body>
    <div class="timer-wrap" id="timerWrap" title="點擊開始計時">
        <div class="timer-circle">
            <div class="timer-fill" id="timerFill"></div>
            <div class="timer-inner" id="timerInner">
                <span class="timer-label" id="timerLabel">點擊開始</span>
                <span id="timerTime">2:00</span>
                <label class="timer-sec-label">秒/題
                    <input type="number" id="timerSecInput" min="5" max="120" value="120" step="5" class="timer-sec-input">
                </label>
            </div>
        </div>
    </div>
    <div id="pageContent">
    <h1>聽寫語詞考試</h1>
    <div class="controls">
        <select id="setSelect">
            <option value="">載入中…</option>
        </select>
        <button type="button" class="btn" id="fullscreenBtn" title="全螢幕">⛶ 全螢幕</button>
        <span class="print-controls" style="display:flex;gap:8px;flex-wrap:wrap;">
            <button type="button" class="btn" id="draftBtn" style="background:linear-gradient(135deg,#ff9800,#f57c00)" title="將目前顯示/隱藏設定定稿並儲存">📋 定稿</button>
            <button type="button" class="btn" id="previewBtn" style="background:linear-gradient(135deg,#8e24aa,#6a1b9a)" title="預覽考試單">👁 預覽</button>
            <button type="button" class="btn" id="downloadPdfBtn" style="background:linear-gradient(135deg,#607d8b,#455a64)" title="下載 PDF 檔">📥 下載PDF</button>
        </span>
        <button type="button" class="btn" id="modeToggleBtn" style="background:linear-gradient(135deg,#9e9e9e,#757575)" title="切換 編輯前次設定 / 考試中 / 對答案 / 全注音">✏️ 編輯前次設定</button>
        <input type="file" id="csvFile" accept=".csv" style="display:none">

        </div>

    <div id="printZone" class="print-zone"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        const SHEET_ID = '1PWGAxP2QEcfb3Aj3m7S-SWVqrxpI3Y3ywhkXcaxv9Ko';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
        const CORS_PROXIES = [
            (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
            (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`
        ];

        function parseCSV(text) {
            text = (text || '').replace(/^\uFEFF/, '');
            const rows = [];
            const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
            for (const line of lines) {
                if (!line.trim()) continue;
                const cells = [];
                let cur = '';
                let inQ = false;
                for (let i = 0; i < line.length; i++) {
                    const ch = line[i];
                    if (ch === '"') {
                        if (inQ && line[i + 1] === '"') { cur += '"'; i++; }
                        else { inQ = !inQ; }
                    } else if (ch === ',' && !inQ) {
                        cells.push(cur);
                        cur = '';
                    } else {
                        cur += ch;
                    }
                }
                cells.push(cur);
                rows.push(cells);
            }
            return rows;
        }

        function pickVoice() {
            if (!('speechSynthesis' in window)) return null;
            const voices = window.speechSynthesis.getVoices();
            if (!voices || !voices.length) return null;
            const zh = voices.filter(v => (v.lang || '').toLowerCase().startsWith('zh-tw'));
            if (zh.length) {
                const m = zh.find(v => v.name.includes('美佳') || v.name.toLowerCase().includes('meijia'));
                return m || zh[0];
            }
            return voices.find(v => (v.lang || '').toLowerCase().startsWith('zh')) || voices[0];
        }

        function onlyHan(text) {
            return (text || '').replace(/[^\u4e00-\u9fff\u3400-\u4dbf]/g, '');
        }
        function escapeHtml(s) {
            const div = document.createElement('div');
            div.textContent = s;
            return div.innerHTML;
        }
        function speak(text) {
            if (!('speechSynthesis' in window)) return;
            const t = (text || '').replace(/[^\u4e00-\u9fff\u3400-\u4dbf\s]/g, '').trim();
            if (!t) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'zh-TW';
            u.rate = 0.8;
            const v = pickVoice();
            if (v) u.voice = v;
            window.speechSynthesis.speak(u);
        }
        function playCheerSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const notes = [523.25, 659.25, 783.99, 1046.50];
                let t = ctx.currentTime;
                notes.forEach((freq, i) => {
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    o.connect(g);
                    g.connect(ctx.destination);
                    o.frequency.value = freq;
                    o.type = 'sine';
                    g.gain.setValueAtTime(0.3, t);
                    g.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
                    o.start(t);
                    o.stop(t + 0.15);
                    t += 0.12;
                });
            } catch (_) {}
        }
        function speakPhraseWithIntro(idx, chars) {
            const text = chars.slice(idx * 4, idx * 4 + 4).join('');
            if (!text) return;
            if (!('speechSynthesis' in window)) return;
            const intro = '第' + (idx + 1) + '題';
            const t2 = (text || '').replace(/[^\u4e00-\u9fff\u3400-\u4dbf\s]/g, '').trim();
            if (!t2) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(intro);
            u.lang = 'zh-TW';
            u.rate = 0.8;
            const v = pickVoice();
            if (v) u.voice = v;
            u.onend = () => {
                setTimeout(() => {
                    const u2 = new SpeechSynthesisUtterance(t2);
                    u2.lang = 'zh-TW';
                    u2.rate = 0.8;
                    if (v) u2.voice = v;
                    window.speechSynthesis.speak(u2);
                }, 1000);
            };
            window.speechSynthesis.speak(u);
        }

        function extractSets(rows) {
            const sets = [];
            const hasData = (r) => {
                if (!r) return false;
                for (let c = 1; c <= 20; c++) {
                    const v = (r[c] || '').trim();
                    if (v && v !== 'A') return true;
                }
                return false;
            };
            for (let i = 1; i < rows.length - 1; i++) {
                const r1 = rows[i];
                const r2 = rows[i + 1];
                if (!hasData(r1) || !hasData(r2)) continue;
                const chars = [];
                const raws = [];
                for (let c = 1; c <= 20; c++) {
                    const v = (r1[c] || '').trim();
                    if (v === 'A' || v === '') { chars.push(''); raws.push(''); }
                    else { chars.push(onlyHan(v) || v); raws.push(v); }
                }
                for (let c = 1; c <= 20; c++) {
                    const v = (r2[c] || '').trim();
                    if (v === 'A' || v === '') { chars.push(''); raws.push(''); }
                    else { chars.push(onlyHan(v) || v); raws.push(v); }
                }
                const a1 = (r1[0] || '').trim();
                const label = /週/.test(a1) ? a1 : ((r2[0] || '').trim() || ('第 ' + (sets.length + 1) + ' 組'));
                sets.push({ label, chars, raws });
                i++;
            }
            return sets;
        }

        (function initStrokeSwipe() {
            const overlay = document.getElementById('strokeOverlay');
            const SWIPE_THRESHOLD = 50;
            let startX = 0;
            let justSwiped = false;
            function handleSwipe(dx) {
                if (Math.abs(dx) < SWIPE_THRESHOLD) return false;
                justSwiped = true;
                if (dx > 0) {
                    strokeOverlayPhraseIdx = (strokeOverlayPhraseIdx + 9) % 10;
                } else {
                    strokeOverlayPhraseIdx = (strokeOverlayPhraseIdx + 1) % 10;
                }
                renderStrokeOverlay();
                setTimeout(() => { justSwiped = false; }, 100);
                return true;
            }
            overlay.addEventListener('touchstart', e => {
                startX = e.touches[0].clientX;
            }, { passive: true });
            overlay.addEventListener('touchend', e => {
                const dx = e.changedTouches[0].clientX - startX;
                if (handleSwipe(dx)) e.preventDefault();
            }, { passive: false });
            overlay.addEventListener('mousedown', e => {
                startX = e.clientX;
            });
            overlay.addEventListener('mouseup', e => {
                handleSwipe(e.clientX - startX);
            });
            overlay.addEventListener('click', e => {
                if (justSwiped) return;
                overlay.classList.add('hidden');
            });
        })();

        (function initMobileFit() {
            const meta = document.querySelector('meta[name="viewport"]');
            const designWPortrait = 920;
            function fit() {
                const physW = screen.width || window.outerWidth;
                const isNarrow = physW <= 768;
                const isLandscape = window.outerWidth > window.outerHeight;
                document.body.classList.toggle('narrow-screen', isNarrow);
                document.body.classList.toggle('narrow-landscape', isNarrow && isLandscape);
                const w = window.outerWidth || window.innerWidth;
                if (w > 768) {
                    meta.setAttribute('content', 'width=device-width, initial-scale=1.0');
                    return;
                }
                var designW = designWPortrait;
                if (isNarrow && isLandscape) {
                    designW = w;
                }
                const s = Math.max(0.3, Math.min(1, (w / designW))).toFixed(2);
                meta.setAttribute('content', 'width=' + designW + ', initial-scale=' + s + ', maximum-scale=' + s + ', user-scalable=no');
            }
            fit();
            window.addEventListener('resize', fit);
            window.addEventListener('orientationchange', function() { setTimeout(fit, 150); });
            document.addEventListener('DOMContentLoaded', fit);
        })();

        function renderOneColumn(draft, chars, raws, mode) {
            const cv = draft.charVisible || [];
            const bv = draft.bopomofoVisible || [];
            const isBopomofoOnly = (mode === 'bopomofo');
            let html = '';
            for (let p = 0; p < 10; p++) {
                const start = p * 4;
                const phraseChars = chars.slice(start, start + 4);
                const phraseRaw = (raws || chars).slice(start, start + 4);
                html += '<div class="exam-item' + (p === 5 ? ' exam-item-lower' : '') + '">';
                html += '<span class="item-num">' + (p + 1) + '</span>';
                html += '<div class="item-units">';
                for (let c = 0; c < 4; c++) {
                    const idx = start + c;
                    const ch = phraseChars[c] || '';
                    const raw = phraseRaw[c] || '';
                    const showCh = cv[idx] !== false;
                    const showBop = bv[idx] !== false;
                    const charCls = showCh ? ' show-only' : ' tianzige';
                    const charContent = showCh ? escapeHtml(ch) : '';
                    const hideEmptyChar = isBopomofoOnly && !ch;
                    html += '<div class="exam-char-cell' + charCls + (hideEmptyChar ? ' char-cell-hidden' : '') + '">' + charContent + '</div>';
                    const bopCls = showBop ? ' show-only' : ' hidden';
                    const bopContent = showBop ? escapeHtml(raw) : '';
                    html += '<div class="exam-bopomofo-cell' + bopCls + '">' + bopContent + '</div>';
                }
                html += '</div></div>';
            }
            return html;
        }

        document.getElementById('previewPrintBtn').addEventListener('click', () => downloadPdf());
        document.getElementById('previewOverlay').addEventListener('click', e => {
            if (e.target.id === 'previewOverlay') closePreview();
        });

        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => pickVoice();
        }

        (function initTimer() {
            const wrap = document.getElementById('timerWrap');
            const fill = document.getElementById('timerFill');
            const labelEl = document.getElementById('timerLabel');
            const timeEl = document.getElementById('timerTime');
            const secInput = document.getElementById('timerSecInput');
            let timerId = null;
            let remaining = 120;
            function getTotalSec() {
                const n = parseInt(secInput.value, 10);
                return (isNaN(n) || n < 5 || n > 120) ? 120 : n;
            }
            let phraseIdx = 0;
            function format(sec) {
                const m = Math.floor(sec / 60);
                const s = sec % 60;
                return m + ':' + (s < 10 ? '0' : '') + s;
            }
            function update() {
                const total = getTotalSec();
                timeEl.textContent = format(remaining);
                const deg = total > 0 ? (remaining / total) * 360 : 0;
                fill.style.background = 'conic-gradient(from -90deg, #42a5f5 0deg, #42a5f5 ' + deg + 'deg, #e0e0e0 ' + deg + 'deg)';
            }
            function tick() {
                remaining--;
                update();
                if (remaining > 0 && remaining % 30 === 0) {
                    const selIdx = parseInt(document.getElementById('setSelect').value, 10);
                    if (!isNaN(selIdx) && allSets[selIdx]) {
                        speakPhraseWithIntro(phraseIdx, allSets[selIdx].chars);
                    }
                }
                if (remaining <= 0) {
                    clearInterval(timerId);
                    timerId = null;
                    phraseIdx++;
                    if (phraseIdx <= 9) {
                        const selIdx = parseInt(document.getElementById('setSelect').value, 10);
                        if (!isNaN(selIdx) && allSets[selIdx]) {
                            speakPhraseWithIntro(phraseIdx, allSets[selIdx].chars);
                        }
                        labelEl.textContent = '第' + (phraseIdx + 1) + '題';
                        updatePhraseHighlight(phraseIdx + 1);
                        remaining = getTotalSec();
                        update();
                        timerId = setInterval(tick, 1000);
                    } else {
                        wrap.classList.remove('running');
                        document.body.classList.remove('timer-running');
                        labelEl.textContent = '點擊開始';
                        updatePhraseHighlight(null);
                        playCheerSound();
                    }
                }
            }
            wrap.addEventListener('click', () => {
                if (timerId) return;
                const selIdx = parseInt(document.getElementById('setSelect').value, 10);
                if (isNaN(selIdx) || !allSets[selIdx]) return;
                wrap.classList.add('running');
                document.body.classList.add('timer-running');
                phraseIdx = 0;
                speakPhraseWithIntro(0, allSets[selIdx].chars);
                labelEl.textContent = '第1題';
                updatePhraseHighlight(1);
                remaining = getTotalSec();
                update();
                timerId = setInterval(tick, 1000);
            });
            labelEl.textContent = '點擊開始';
            update();
            secInput.addEventListener('mousedown', e => e.stopPropagation());
            secInput.addEventListener('click', e => e.stopPropagation());
        })();

        loadSheet();
    </script>
</body>
</html>
